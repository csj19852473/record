<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 매크로 일지 — 공유</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg0: #0d0d14; --bg1: #13131f; --bg2: #1a1a2e; --bg3: #22223a;
  --border: #2a2a45;
  --text1: #e8e8f0; --text2: #9494b8; --text3: #5a5a80;
  --up: #ef5350; --down: #1976d2;
  --accent: #5c6bc0; --accent2: #7986cb;
  --yellow: #ffd54f; --radius: 8px;
}
body { background: var(--bg0); color: var(--text1); font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 13px; min-height: 100vh; }
/* 헤더 */
header { background: var(--bg1); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 15px; font-weight: 600; color: var(--accent2); }
.upd-badge { font-size: 11px; color: var(--text3); margin-left: auto; }
.share-badge { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--text2); }
/* 레이아웃 */
#main-layout { display: grid; grid-template-columns: 240px 1fr 340px; grid-auto-rows: auto; gap: 0; align-items: start; }
#left-col { grid-column: 1; grid-row: 1 / span 2; display: flex; flex-direction: column; gap: 8px; padding: 12px 8px 12px 12px; border-right: 1px solid var(--border); overflow-y: auto; max-height: calc(100vh - 50px); }
#center-col { grid-column: 2; grid-row: 1 / span 2; padding: 12px; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
#cal-section { grid-column: 3; grid-row: 1; border-left: 1px solid var(--border); padding: 10px; display: flex; flex-direction: column; gap: 8px; }
#right-col { grid-column: 3; grid-row: 2; border-left: 1px solid var(--border); padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
/* 카드 */
.card { background: var(--bg1); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
.card-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
/* 미니 카드 */
#mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.mini-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 8px; }
.mini-name { font-size: 10px; color: var(--text2); margin-bottom: 1px; }
.mini-pct  { font-size: 12px; font-weight: 600; margin-bottom: 1px; }
.mini-price { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
.mini-card canvas { width: 100% !important; height: 36px !important; display: block; }
.up { color: var(--up); } .dn { color: var(--down); }
/* 큰 차트 */
.large-chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.chart-mkt-name { font-size: 12px; font-weight: 600; color: var(--text2); }
.chart-select { background: var(--bg2); color: var(--text1); border: 1px solid var(--border); border-radius: 5px; padding: 3px 8px; font-size: 12px; }
.lc { width: 100%; height: 210px; }
.chart-resize-bar { height:18px; cursor:ns-resize; display:flex; align-items:center; justify-content:center; touch-action:none; margin:1px 0; }
.chart-resize-bar::after { content:''; display:block; width:44px; height:3px; border-radius:3px; background:var(--border); transition:background .15s; }
.chart-resize-bar:active::after { background:var(--accent2); }
.nav-bar { height: 18px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; position: relative; cursor: pointer; user-select: none; margin-top: 5px; overflow: hidden; }
.nav-thumb { position: absolute; top: 2px; bottom: 2px; left: 75%; width: 25%; background: var(--accent); border-radius: 3px; cursor: grab; opacity: .65; }
/* 수급 */
.supply-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.supply-table th { font-size: 10px; color: var(--text3); font-weight: 400; padding: 3px 6px; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
.supply-table th:first-child { text-align: left; }
.supply-table td { padding: 4px 6px; text-align: right; font-weight: 600; white-space: nowrap; }
.supply-table td:first-child { text-align: left; color: var(--text2); font-weight: 400; font-size: 11px; }
.supply-tab-bar { display:flex; gap:6px; margin-bottom:14px; }
.supply-tab { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:5px 14px; font-size:12px; color:var(--text2); cursor:pointer; }
.supply-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
.supply-chart-wrap { position:relative; width:100%; height:180px; margin-bottom:16px; }
.supply-chart-label { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:4px; }
/* 일지 목록 */
.record-row { display: flex; align-items: center; padding: 7px 8px; border-radius: var(--radius); border: 1px solid transparent; cursor: pointer; gap: 8px; }
.record-row:hover { background: var(--bg2); border-color: var(--border); }
.rec-date { font-size: 12px; color: var(--text2); white-space: nowrap; }
.rec-summary { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; font-size: 12px; color: var(--text1); }
.rec-tags { display: flex; gap: 3px; flex-shrink: 0; }
.tag-chip { font-size: 10px; padding: 1px 7px; border-radius: 12px; background: var(--bg3); color: var(--text2); }
/* 포트폴리오 카드 */
.pf-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.pf-row:last-child { border-bottom: none; }
.pf-label { color: var(--text2); }
.pf-val { font-weight: 600; }
/* 미국 주식 상세 */
.us-stock-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.us-stock-row:last-child { border-bottom: none; }
.us-tk { font-weight: 600; color: var(--accent2); width: 50px; flex-shrink: 0; }
.us-name { color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.us-pnl { font-weight: 600; flex-shrink: 0; width: 55px; text-align: right; }
.us-val { color: var(--text3); flex-shrink: 0; width: 75px; text-align: right; }
/* 캘린더 */
.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.cal-header span { font-size: 13px; font-weight: 600; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-dh { text-align: center; font-size: 10px; color: var(--text3); padding: 4px 0; }
.cal-cell { display: flex; flex-direction: column; align-items: center; padding: 3px 2px; border-radius: 4px; min-height: 30px; border: 1px solid transparent; }
.cal-cell.has-entry .cal-num { font-weight: 700; color: var(--accent2); }
.cal-cell.today { border-color: var(--accent2); }
.cal-cell.other { opacity: .25; }
.cal-cell.selected { background: var(--bg3); }
#entry-preview { cursor: pointer; transition: opacity .15s; }
#entry-preview:hover { opacity: .85; }
.cal-num { font-size: 12px; line-height: 1; }
.cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; margin-top: 2px; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
/* KR 보유종목 */
.kr-pos-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.kr-pos-bar-bg { flex:1; background:var(--bg3); border-radius:3px; height:7px; overflow:hidden; }
.kr-pos-bar { height:100%; border-radius:3px; background:#eab308; transition:width .3s; }
/* 자산 추이 */
.trend-chart { width: 100%; height: 100px; }
/* 카드 확장 버튼 */
.expand-btn { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--text3); font-size: 14px; cursor: pointer; padding: 2px 4px; border-radius: 4px; line-height: 1; }
.expand-btn:hover { color: var(--text1); background: var(--bg3); }
.expandable { position: relative; }
/* 확장 모달 */
#expand-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 600; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
#expand-modal.open { display: flex; }
#expand-inner { background: var(--bg1); border: 1px solid var(--border); border-radius: 12px; padding: 16px; width: 100%; max-width: 700px; margin: auto; position: relative; }
#expand-close { position: absolute; top: 12px; right: 14px; background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; }
#expand-close:hover { color: var(--text1); }
#expand-title { font-size: 14px; font-weight: 700; color: var(--accent2); margin-bottom: 14px; padding-right: 24px; }
/* 일지 상세 팝업 */
#entry-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
#entry-modal.open { display: flex; }
#entry-card { background: var(--bg1); border: 1px solid var(--border); border-radius: 12px; padding: 20px; width: 100%; max-width: 640px; max-height: 85vh; overflow-y: auto; position: relative; }
#entry-card h3 { font-size: 14px; font-weight: 700; margin: 0; color: var(--accent2); }
.entry-nav-btn { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 2px 8px; flex-shrink: 0; line-height: 1; }
.entry-nav-btn:disabled { opacity: .2; cursor: default; }
.entry-section { margin-bottom: 12px; }
.entry-section-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
.entry-text { font-size: 13px; color: var(--text1); white-space: pre-wrap; line-height: 1.6; background: var(--bg2); border-radius: var(--radius); padding: 8px 10px; }
.src-block { background: var(--bg2); border-radius: var(--radius); padding: 8px 10px; margin-bottom: 6px; }
.src-name { font-size: 11px; color: var(--accent2); font-weight: 600; margin-bottom: 4px; }
.src-text { font-size: 12px; color: var(--text2); white-space: pre-wrap; line-height: 1.5; }
.close-btn { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; padding: 0; }
.close-btn:hover { color: var(--text1); }
/* 모바일 */
@media (max-width: 900px) {
  #main-layout { grid-template-columns: 1fr; }
  #cal-section { grid-column: 1; grid-row: auto; border-left: none; border-bottom: 1px solid var(--border); }
  #left-col { grid-column: 1; grid-row: auto; border-right: none; border-bottom: 1px solid var(--border); max-height: none; overflow-y: visible; padding: 10px; }
  #center-col { grid-column: 1; grid-row: auto; padding: 10px; }
  #right-col { grid-column: 1; grid-row: auto; border-left: none; border-bottom: 1px solid var(--border); max-height: none; overflow-y: visible; padding: 10px; }
  header { padding: 8px 12px; flex-wrap: nowrap; gap: 6px; }
  header h1 { font-size: 13px; white-space: nowrap; }
  .share-badge { font-size: 10px; padding: 2px 7px; white-space: nowrap; flex-shrink: 0; }
  .upd-badge { font-size: 9px; white-space: nowrap; }
}
/* 스크롤바 */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg0); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">
<header>
  <h1>📊 투자 매크로 일지</h1>
  <span class="share-badge">👁 공유 뷰</span>
  <span class="upd-badge">업데이트: 2026-07-11 19:52</span>
</header>

<div id="main-layout">
<!-- ── 달력 (모바일 최상단) ── -->
<div id="cal-section">
  <div class="card">
    <div class="cal-header">
      <button onclick="miniCalNav(-1)" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:2px 6px;line-height:1;">◀</button>
      <span id="cal-title"></span>
      <div style="display:flex;gap:2px;align-items:center;">
        <button onclick="miniCalNav(1)" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:2px 6px;line-height:1;">▶</button>
        <button onclick="openExpand('calendar')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 4px;line-height:1;border-radius:4px;">⤢</button>
      </div>
    </div>
    <div class="cal-grid" id="cal-dh">
      <div class="cal-dh">일</div><div class="cal-dh">월</div><div class="cal-dh">화</div>
      <div class="cal-dh">수</div><div class="cal-dh">목</div><div class="cal-dh">금</div>
      <div class="cal-dh" style="color:#ef5350;">토</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <!-- 날짜 클릭 시 기록 미리보기 -->
  <div id="entry-preview" class="card" style="display:none;padding:8px 10px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <span id="ep-date" style="font-size:12px;font-weight:600;color:var(--accent2);"></span>
      <div id="ep-dots"></div>
    </div>
    <div id="ep-summary" style="font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:4px;white-space:pre-wrap;"></div>
    <div style="font-size:10px;color:var(--text3);text-align:right;">눌러서 전체 보기 ▶</div>
  </div>
</div>

<!-- ── 왼쪽: 시장 미니카드 + 수급 ── -->
<div id="left-col">
  <div id="mini-grid">
    <div class="mini-card" id="mc-nasdaq"><div class="mini-name">나스닥</div><div class="mini-pct" id="p-nasdaq">—</div><div class="mini-price" id="v-nasdaq">—</div><canvas id="sc-nasdaq"></canvas></div>
    <div class="mini-card" id="mc-kospi"><div class="mini-name">코스피</div><div class="mini-pct" id="p-kospi">—</div><div class="mini-price" id="v-kospi">—</div><canvas id="sc-kospi"></canvas></div>
    <div class="mini-card" id="mc-btc"><div class="mini-name">비트코인</div><div class="mini-pct" id="p-btc">—</div><div class="mini-price" id="v-btc">—</div><canvas id="sc-btc"></canvas></div>
    <div class="mini-card" id="mc-gold"><div class="mini-name">금</div><div class="mini-pct" id="p-gold">—</div><div class="mini-price" id="v-gold">—</div><canvas id="sc-gold"></canvas></div>
    <div class="mini-card" id="mc-usdkrw"><div class="mini-name">달러/원</div><div class="mini-pct" id="p-usdkrw">—</div><div class="mini-price" id="v-usdkrw">—</div><canvas id="sc-usdkrw"></canvas></div>
    <div class="mini-card" id="mc-wti"><div class="mini-name">WTI 원유</div><div class="mini-pct" id="p-wti">—</div><div class="mini-price" id="v-wti">—</div><canvas id="sc-wti"></canvas></div>
  </div>

  <div class="card expandable">
    <button class="expand-btn" onclick="openExpand('supply')">⤢</button>
    <div class="card-title">수급 (자동)</div>
    <table class="supply-table" id="supply-tbl">
      <thead><tr><th></th><th>코스피</th><th>코스닥</th><th>선물</th></tr></thead>
      <tbody id="supply-body"></tbody>
    </table>
  </div>

</div>

<!-- ── 중앙: 큰 차트 + 일지 목록 ── -->
<div id="center-col">
  <div class="card">
    <div class="large-chart-header">
      <span class="chart-mkt-name" id="main-chart-name">나스닥</span>
      <select class="chart-select" id="chart-selector">
        <option value="nasdaq">나스닥</option>
        <option value="kospi">코스피</option>
        <option value="btc">비트코인</option>
        <option value="gold">금</option>
        <option value="usdkrw">달러/원</option>
        <option value="wti">WTI 원유</option>
      </select>
    </div>
    <div id="main-chart" class="lc"></div>
    <div class="chart-resize-bar" data-chart="main-chart"></div>
    <div class="nav-bar"><div class="nav-thumb" id="nav-thumb"></div></div>
  </div>

  <div class="card">
    <div class="large-chart-header">
      <span class="chart-mkt-name" id="sub-chart-name">코스피</span>
      <select class="chart-select" id="sub-chart-selector">
        <option value="kospi">코스피</option>
        <option value="nasdaq">나스닥</option>
        <option value="btc">비트코인</option>
        <option value="gold">금</option>
        <option value="usdkrw">달러/원</option>
        <option value="wti">WTI 원유</option>
      </select>
    </div>
    <div id="sub-chart" class="lc"></div>
    <div class="chart-resize-bar" data-chart="sub-chart"></div>
    <div class="nav-bar"><div class="nav-thumb" id="nav-thumb2"></div></div>
  </div>

  <div class="card">
    <div class="card-title" style="margin-bottom:6px;">최근 일지</div>
    <div id="entry-list"></div>
  </div>
</div>

<!-- ── 오른쪽: 포트폴리오 + 미국주식 + 캘린더 ── -->
<div id="right-col">

  <div class="card expandable">
    <button class="expand-btn" onclick="openExpand('kr-portfolio')">⤢</button>
    <div class="card-title">🤖 자동매매 자산</div>
    <div class="pf-row"><span class="pf-label">추정예탁자산</span><span class="pf-val">0원</span></div>
    <div class="pf-row"><span class="pf-label">보유평가</span><span class="pf-val">0원</span></div>
    <div class="pf-row"><span class="pf-label">예수금</span><span class="pf-val">0원</span></div>
    <div style="font-size:10px;color:var(--text3);margin-top:6px;text-align:right;">  기준</div>
    <div style="position:relative;height:90px;margin-top:8px;"><canvas id="kr-trend"></canvas></div>
  </div>

  <div class="card expandable">
    <button class="expand-btn" onclick="openExpand('us-portfolio')">⤢</button>
    <div class="card-title">🇺🇸 미국주식</div>
    <div class="pf-row"><span class="pf-label">총 평가</span><span class="pf-val">0원</span></div>
    <div class="pf-row"><span class="pf-label">달러 환산</span><span class="pf-val">$0.00</span></div>
    <div class="pf-row"><span class="pf-label">환율</span><span class="pf-val">0.00원/달러</span></div>
    <div class="pf-row">
      <span class="pf-label">전일 대비</span>
      <span class="pf-val up">+0원</span>
    </div>
    <div style="font-size:10px;color:var(--text3);margin-top:6px;text-align:right;">  기준</div>
    <div style="position:relative;height:90px;margin-top:8px;"><canvas id="us-trend"></canvas></div>
  </div>


</div>
</div>
</div>

<!-- 카드 확장 모달 -->
<div id="expand-modal">
  <div id="expand-inner">
    <button id="expand-close" onclick="closeExpand()">✕</button>
    <div id="expand-title"></div>
    <div id="expand-body"></div>
  </div>
</div>

<!-- 일지 상세 팝업 -->
<div id="entry-modal">
  <div id="entry-card">
    <button class="close-btn" onclick="closeEntry()">✕</button>
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:14px;">
      <button id="entry-prev-btn" class="entry-nav-btn" onclick="entryNav(-1)">◀</button>
      <h3 id="entry-modal-date" style="flex:1;text-align:center;"></h3>
      <button id="entry-next-btn" class="entry-nav-btn" onclick="entryNav(1)">▶</button>
    </div>
    <div id="entry-modal-body"></div>
  </div>
</div>

<script>
// ── 데이터 ──────────────────────────────────────────
const MKT = {"nasdaq": [], "kospi": [], "btc": [], "gold": [], "usdkrw": [], "wti": []};
const ENTRIES = [];
const US_DETAILS = [];
const PS_HISTORY = [];
const US_HISTORY = [];
const SUPPLY = {};
const KR_POSITIONS = [{"name": "보령", "current_step": 7, "total_steps": 100, "accumulated": 11}, {"name": "HMM", "current_step": 4, "total_steps": 100, "accumulated": 6}];
const US_PF_HIST = [];
const ENTRY_RAW = {};
const TODAY = '2026-07-11';
const EVENTS = [];
const KR_DEPOSITS = [];
const US_DEPOSITS = [];
const US_HISTORY_USD = [];

// ── 숫자 포맷 ────────────────────────────────────────
function fmt(n, dec=2) {
  if (!n && n !== 0) return '—';
  if (n >= 1e8) return (n/1e8).toFixed(1) + '억';
  if (n >= 1e4) return (n/1e4).toFixed(0) + '만';
  return n.toLocaleString();
}
function fmtPrice(v, key) {
  if (key === 'btc') return '$' + Number(v).toLocaleString('en', {maximumFractionDigits:0});
  if (key === 'gold') return '$' + Number(v).toFixed(1);
  if (key === 'usdkrw') return Number(v).toFixed(2) + '원';
  if (key === 'wti') return '$' + Number(v).toFixed(2);
  return Number(v).toLocaleString('ko', {maximumFractionDigits:2});
}

function drawSparkline(canvasId, data, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !data.length) return;
  const vals = data.map(d => d.close || d.value || 0);
  new Chart(canvas, {
    type: 'line',
    data: { labels: vals.map((_,i) => i), datasets: [{ data: vals, borderColor: color, borderWidth: 1.5, fill: false, pointRadius: 0, tension: 0.3 }] },
    options: { responsive: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } }, animation: false }
  });
}

const KEYS = ['nasdaq','kospi','btc','gold','usdkrw','wti'];
KEYS.forEach(key => {
  const data = MKT[key] || [];
  if (!data.length) return;
  const cur = data[data.length-1].close;
  const prev = data.length > 1 ? data[data.length-2].close : cur;
  const pct = ((cur - prev) / prev * 100);
  const cls = pct >= 0 ? 'up' : 'dn';
  const sign = pct >= 0 ? '+' : '';
  document.getElementById('p-' + key).innerHTML = `<span class="${cls}">${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%</span>`;
  document.getElementById('v-' + key).textContent = fmtPrice(cur, key);
  const mini = data.slice(-60);
  const color = pct >= 0 ? '#ef5350' : '#1976d2';
  drawSparkline('sc-' + key, mini, color);
});

let mainChart = null, mainSeries = null;
let subChart = null, subSeries = null;

function buildChart(containerId, data, isMain) {
  const el = document.getElementById(containerId);
  if (!el) return null;
  const c = LightweightCharts.createChart(el, {
    width: el.clientWidth, height: 210,
    layout: { background: { color: '#13131f' }, textColor: '#9494b8' },
    grid: { vertLines: { color: '#2a2a45' }, horzLines: { color: '#2a2a45' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#2a2a45' },
    timeScale: { borderColor: '#2a2a45', timeVisible: true },
  });
  const series = c.addCandlestickSeries({
    upColor: '#ef5350', downColor: '#1976d2',
    borderUpColor: '#ef5350', borderDownColor: '#1976d2',
    wickUpColor: '#ef5350', wickDownColor: '#1976d2',
  });
  const formatted = data.map(d => ({
    time: d.date, open: d.open || d.close, high: d.high || d.close,
    low: d.low || d.close, close: d.close
  })).filter(d => d.time);
  series.setData(formatted);
  c.timeScale().fitContent();
  if (isMain) { mainChart = c; mainSeries = series; }
  else { subChart = c; subSeries = series; }
  return c;
}

let _supMkt = 'kospi', _supCharts = {};
function renderSupplyCharts(mkt) {
  _supMkt = mkt;
  document.querySelectorAll('.supply-tab').forEach(b => b.classList.toggle('active', b.textContent === {kospi:'코스피',kosdaq:'코스닥',deriv:'파생'}[mkt]));
  const allDates = Object.keys(SUPPLY).sort();
  const dates = allDates.slice(-30);
  const labels = dates.map(d => d.slice(5));
  const pfx = mkt;
  const KEYS = { ind: pfx+'_ind', for: pfx+'_for', inst: pfx+'_inst' };
  function getSeries(k) { return dates.map(d => { const v = SUPPLY[d]; return (v && v[k] != null) ? v[k] : null; }); }
  function cumSum(arr) { let s=0; return arr.map(v => { if(v!=null) s+=v; return v!=null?s:null; }); }
  const COLORS = { ind:{line:'#f87171'}, for:{line:'#60a5fa'}, inst:{line:'#4ade80'} };
  [['supply-chart-ind','ind'],['supply-chart-for','for'],['supply-chart-inst','inst']].forEach(([cid,sk]) => {
    const daily = getSeries(KEYS[sk]);
    const cum = cumSum(daily);
    if (_supCharts[cid]) { _supCharts[cid].destroy(); delete _supCharts[cid]; }
    const canvas = document.getElementById(cid);
    if (!canvas) return;
    _supCharts[cid] = new Chart(canvas.getContext('2d'), {
      data: { labels,
        datasets: [
          { type:'bar', label:'일별', data:daily,
            backgroundColor: daily.map(v => v>=0 ? 'rgba(74,222,128,.7)' : 'rgba(248,113,113,.7)'),
            borderColor:     daily.map(v => v>=0 ? '#4ade80' : '#f87171'),
            borderWidth:1, yAxisID:'yBar', order:2 },
          { type:'line', label:'누적', data:cum,
            borderColor:COLORS[sk].line, backgroundColor:'transparent',
            borderWidth:2, pointRadius:2, tension:0.3, yAxisID:'yCum', order:1 }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        interaction:{ mode:'index', intersect:false },
        plugins:{ legend:{display:false},
          tooltip:{ callbacks:{ label(ctx){ const v=ctx.parsed.y; if(v==null) return ''; return (ctx.dataset.label==='누적'?'누적 ':'일별 ')+(v>=0?'+':'')+Math.round(v).toLocaleString()+'억'; } } }
        },
        scales:{
          x:{ ticks:{color:'#9ca3af',font:{size:10},maxRotation:45}, grid:{color:'rgba(255,255,255,.05)'} },
          yBar:{ position:'left', ticks:{color:'#9ca3af',font:{size:10},callback(v){return(v>=0?'+':'')+Math.round(v).toLocaleString();}}, grid:{color:'rgba(255,255,255,.06)'} },
          yCum:{ position:'right', ticks:{color:COLORS[sk].line,font:{size:10},callback(v){return(v>=0?'+':'')+Math.round(v).toLocaleString();}}, grid:{drawOnChartArea:false} }
        }
      }
    });
  });
}

function drawTrendLine(canvasId, history, color, histMarkers, depMarkers) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !history.length) return;
  const existing = Chart.getChart(canvas);
  if (existing) existing.destroy();
  const labels = history.map(h => h.date.slice(5));
  const vals = history.map(h => Math.round(h.val / 10000));
  const mn = Math.min(...vals), mx = Math.max(...vals);
  const pad = (mx - mn) * 0.15 || 2;
  const histSet = new Set((histMarkers || []).map(d => d.slice(5)));
  const depSet  = new Set((depMarkers  || []).map(d => d.slice(5)));
  const hasMarkers = histSet.size || depSet.size;
  const markerPlugin = {
    id: 'pfMarkers',
    afterDraw(chart) {
      if (!hasMarkers) return;
      const ctx = chart.ctx, xs = chart.scales.x, area = chart.chartArea;
      chart.data.labels.forEach((lbl, i) => {
        let col = null;
        if (histSet.has(lbl)) col = '#eab308';
        else if (depSet.has(lbl)) col = '#4ade80';
        if (!col) return;
        const x = xs.getPixelForValue(i);
        ctx.save();
        ctx.fillStyle = col;
        const ty = area.top + 2;
        ctx.beginPath(); ctx.moveTo(x-5, ty); ctx.lineTo(x+5, ty); ctx.lineTo(x, ty+9); ctx.closePath(); ctx.fill();
        ctx.restore();
      });
    }
  };
  new Chart(canvas, {
    type: 'line',
    data: { labels, datasets: [{ data: vals, borderColor: color, backgroundColor: 'transparent', fill: false, tension: 0, pointRadius: 3, pointBackgroundColor: color, borderWidth: 2 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false,
      layout: { padding: { top: hasMarkers ? 14 : 0 } },
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 9 }, maxTicksLimit: 5 }, grid: { color: '#2a2a45' } },
        y: {
          min: mn - pad,
          max: mx + pad,
          ticks: { font: { size: 9 }, callback: v => Math.round(v) + '만' },
          grid: { color: '#2a2a45' }
        }
      }
    },
    plugins: [markerPlugin]
  });
}

// ── 수익금/수익률 헬퍼 ───────────────────────────────
function fmtWon(n) {
  const a = Math.abs(n);
  if (a >= 1e8) return (n/1e8).toFixed(2) + '억원';
  if (a >= 1e4) return (n/1e4).toFixed(0) + '만원';
  return n.toLocaleString() + '원';
}
function buildCumDeposits(deposits, dates) {
  const sorted = [...deposits].sort((a, b) => a.date.localeCompare(b.date));
  let cum = 0, si = 0;
  const res = [];
  for (let i = 0; i < dates.length; i++) {
    while (si < sorted.length && sorted[si].date <= dates[i]) { cum += sorted[si].amount; si++; }
    res.push(cum);
  }
  return res;
}
function drawMobilePnlChart(canvasId, history, deposits, chartType) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !history.length) return;
  const existing = Chart.getChart(canvas);
  if (existing) existing.destroy();
  const dates = history.map(h => h.date.slice(5));
  const assets = history.map(h => h.val);
  const cumDep = buildCumDeposits(deposits, history.map(h => h.date));
  let vals, fmtTick;
  if (chartType === 'profit') {
    vals = assets.map((v, i) => cumDep[i] > 0 ? Math.round((v - cumDep[i]) / 10000) : 0);
    fmtTick = v => (v >= 0 ? '+' : '') + Math.round(v) + '만';
  } else {
    vals = assets.map((v, i) => cumDep[i] > 0 ? parseFloat(((v - cumDep[i]) / cumDep[i] * 100).toFixed(2)) : 0);
    fmtTick = v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%';
  }
  const ptColors = vals.map(v => v >= 0 ? '#4ade80' : '#f87171');
  new Chart(canvas, {
    type: 'line',
    data: { labels: dates, datasets: [{
      data: vals,
      segment: { borderColor: ctx => ctx.p0.parsed.y >= 0 ? '#4ade80' : '#f87171' },
      pointBackgroundColor: ptColors,

    }] },
    options: {

      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 9 }, maxTicksLimit: 5 }, grid: { color: '#2a2a45' } },
        y: { ticks: { font: { size: 9 }, callback: fmtTick }, grid: { color: '#2a2a45' } }
      }
    }
  });
}

const DOT_COLOR = { gray: '#9494b8', red: '#ef5350', green: '#4caf50', blue: '#7986cb' };
function dotsBadge(dots, compact, hasEvent) {
  const sections = ['issue', 'reaction', 'sources', 'analyses'];
  let inner = '';
  if (hasEvent) inner += `<div class="cal-dot" style="background:#ffd54f;" title="실적 일정"></div>`;
  if (dots) {
    sections.forEach(key => {
      const sec = dots[key];
      if (!sec || sec.color === 'none') return;
      const c = DOT_COLOR[sec.color] || '#9494b8';
      const cnt = compact ? 1 : (sec.count || 1);
      for (let i = 0; i < cnt; i++) inner += `<div class="cal-dot" style="background:${c};"></div>`;
    });
  }
  return inner ? `<div class="cal-dots">${inner}</div>` : '';
}

function updateMiniCards(dateStr) {
  KEYS.forEach(key => {
    const data = MKT[key] || [];
    if (!data.length) return;
    let idx = -1;
    for (let i = data.length - 1; i >= 0; i--) {
      if (data[i].date <= dateStr) { idx = i; break; }
    }
    if (idx < 0) return;
    const cur = data[idx].close;
    const prev = idx > 0 ? data[idx-1].close : cur;
    const pct = (cur - prev) / prev * 100;
    const cls = pct >= 0 ? 'up' : 'dn';
    document.getElementById('p-' + key).innerHTML = `<span class="${cls}">${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%</span>`;
    document.getElementById('v-' + key).textContent = fmtPrice(cur, key);
    const mini = data.slice(Math.max(0, idx - 59), idx + 1);
    const color = pct >= 0 ? '#ef5350' : '#1976d2';
    const canvasId = 'sc-' + key;
    const existing = Chart.getChart(canvasId);
    if (existing) existing.destroy();
    drawSparkline(canvasId, mini, color);
  });
}

  let tx = 0;
  const card = document.getElementById('entry-card');
  card.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
  card.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) < 50) return;
    entryNav(dx < 0 ? 1 : -1);
  }, { passive: true });

  let cx = 0;
  const cal = document.getElementById('cal-section');
  cal.addEventListener('touchstart', e => { cx = e.touches[0].clientX; }, { passive: true });
  cal.addEventListener('touchend', e => {
    if (document.getElementById('entry-modal').classList.contains('open')) return;
    const dx = e.changedTouches[0].clientX - cx;
    if (Math.abs(dx) < 50) return;
    miniCalNav(dx < 0 ? 1 : -1);
  }, { passive: true });
})();
</script>
</body>
</html>
